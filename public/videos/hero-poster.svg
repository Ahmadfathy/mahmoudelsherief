<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B2D8B"/>
      <stop offset="100%" stop-color="#2D1456"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#FFD84D" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFD84D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <circle cx="900" cy="360" r="300" fill="url(#glow)"/>
  <g transform="translate(640, 360)" opacity="0.85">
    <circle r="120" fill="none" stroke="#FFD84D" stroke-width="3"/>
    <circle r="80" fill="none" stroke="#FFD84D" stroke-width="2"/>
    <circle r="6" fill="#FFD84D"/>
    <path d="M 0,-120 L 30,-60 L 0,0 Z" fill="#FFD84D" opacity="0.7"/>
    <path d="M 104,-60 L 30,-60 L 60,0 Z" fill="#FFD84D" opacity="0.5"/>
    <path d="M 104,60 L 60,0 L 30,60 Z" fill="#FFD84D" opacity="0.3"/>
  </g>
  <text x="640" y="600" text-anchor="middle" fill="white" font-family="serif" font-size="32" font-weight="bold" opacity="0.7">Hero Video Placeholder</text>
  <text x="640" y="640" text-anchor="middle" fill="white" font-family="sans-serif" font-size="16" opacity="0.5">ضع فيديو الترويج في public/videos/hero.mp4</text>
</svg>
